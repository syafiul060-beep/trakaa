# Railway — API trakaa (monorepo).
# Disarankan juga: Dashboard → service trakaa → Settings → Source → Root Directory = traka-api
# Supaya build dari root repo tidak gagal (Railpack tanpa deteksi), pakai Nixpacks + nixpacks.toml di root.

[build]
builder = "nixpacks"
watchPatterns = ["traka-api/**"]

[deploy]
# Start dari nixpacks.toml: root repo → cd traka-api && npm start; jika Root Directory = traka-api → traka-api/nixpacks.toml (npm start)
healthcheckPath = "/health"

# API monorepo: builder NIXPACKS + nixpacks.toml di root, atau Root Directory = traka-api.

[build]
builder = "NIXPACKS"
watchPatterns = ["traka-api/**"]

[deploy]
# Start dari nixpacks.toml: root repo → cd traka-api && npm start; jika Root Directory = traka-api → traka-api/nixpacks.toml (npm start)
healthcheckPath = "/health"

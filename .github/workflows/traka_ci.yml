# `dart analyze --fatal-warnings --fatal-infos` mem-fail pada error, warning, dan info (lint termasuk use_build_context_synchronously).
# Job build-hybrid-smoke: kompilasi APK debug dengan dart-define hybrid (Tahap 3) agar regresi compile terdeteksi di CI.
name: Traka CI

on:
  push:
    branches: [main, master]
    paths:
      - "traka/**"
      - ".github/workflows/traka_ci.yml"
  pull_request:
    paths:
      - "traka/**"
      - ".github/workflows/traka_ci.yml"
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: traka
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      # `lib/firebase_options.dart` di-gitignore (generate lokal). Analyzer butuh file ini.
      - run: cp lib/firebase_options.example.dart lib/firebase_options.dart
      - run: dart analyze --fatal-warnings --fatal-infos

  unit-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: traka
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: cp lib/firebase_options.example.dart lib/firebase_options.dart
      - run: |
          flutter test \
            test/driver_schedule_prune_test.dart \
            test/route_utils_test.dart \
            test/validation_utils_test.dart \
            test/retry_utils_test.dart \
            test/app_constants_test.dart \
            test/order_model_test.dart \
            test/order_service_test.dart \
            test/placemark_formatter_test.dart \
            test/stnk_plate_extraction_test.dart \
            test/ktp_ocr_extraction_test.dart \
            test/sim_ocr_extraction_test.dart \
            test/passenger_first_chat_message_test.dart \
            test/vehicle_plat_service_test.dart \
            test/app_logger_test.dart

  # Kompilasi jalur hybrid + createOrder API (tanpa upload artifact; hanya cegah drift compile).
  build-hybrid-smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: traka
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: cp lib/firebase_options.example.dart lib/firebase_options.dart
      - name: flutter build apk --debug (hybrid + CREATE_ORDER_VIA_API)
        env:
          MAPS_API_KEY: ci_placeholder_maps_key
        run: |
          flutter build apk --debug \
            --dart-define=TRAKA_API_BASE_URL=https://trakaa-production.up.railway.app \
            --dart-define=TRAKA_USE_HYBRID=true \
            --dart-define=TRAKA_CREATE_ORDER_VIA_API=true
